<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, viewport-fit=cover">
  <title>Radio La Tropa | Centro de Veteranos de Malvinas, Marcos Paz, Prov. de Buenos Aires</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto Condensed', 'Oswald', sans-serif;
      padding: 1.2rem;
      margin: 0;
      background-color: #1e2b15;
      position: relative;
      overflow-x: hidden;
    }

    .flag-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: linear-gradient(180deg, 
        #74acdf 0%, #74acdf 33.333%, 
        #ffffff 33.333%, #ffffff 66.666%, 
        #74acdf 66.666%, #74acdf 100%);
      background-size: 100% 100%;
      animation: gentleWave 7s ease-in-out infinite alternate;
      box-shadow: inset 0 0 200px rgba(0,0,0,0.25);
    }

    .flag-background::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(38vmin, 300px);
      height: min(38vmin, 300px);
      background: radial-gradient(circle, #f7b32b 8%, #f5a623 35%, transparent 60%);
      border-radius: 50%;
      opacity: 0.5;
      box-shadow: 0 0 90px 35px rgba(247, 179, 43, 0.55);
      animation: sunGlow 6s infinite alternate ease-in-out;
      z-index: 0;
    }

    .flag-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 25% 40%, rgba(60, 70, 20, 0.18) 6%, transparent 14%),
        radial-gradient(circle at 70% 65%, rgba(75, 80, 25, 0.15) 10%, transparent 20%),
        radial-gradient(circle at 45% 20%, rgba(50, 55, 15, 0.1) 8%, transparent 16%);
      background-size: 200px 200px, 240px 240px, 180px 180px;
      background-position: 0 0, 60px 80px, 120px 40px;
      pointer-events: none;
      animation: camoDrift 20s linear infinite;
      z-index: 1;
    }

    @keyframes gentleWave {
      0% {
        filter: drop-shadow(0 0 12px rgba(0,0,0,0.5)) brightness(1);
        transform: scale(1) rotate(0deg);
      }
      100% {
        filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4)) brightness(1.06);
        transform: scale(1.01) rotate(0.15deg);
      }
    }

    @keyframes sunGlow {
      0% {
        opacity: 0.45;
        transform: translate(-50%, -50%) scale(0.9);
      }
      100% {
        opacity: 0.75;
        transform: translate(-50%, -50%) scale(1.2);
        box-shadow: 0 0 130px 50px rgba(247, 179, 43, 0.7);
      }
    }

    @keyframes camoDrift {
      0% { background-position: 0 0, 60px 80px, 120px 40px; }
      100% { background-position: 200px 0, 260px 80px, 320px 40px; }
    }

    .player-container {
      position: relative;
      z-index: 15;
      width: 100%;
      max-width: 680px;
      background: rgba(28, 33, 18, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: linear-gradient(145deg, rgba(45, 50, 28, 0.9) 0%, rgba(32, 36, 18, 0.92) 80%);
      border: 2px solid #b89b4b;
      border-radius: 2.8rem 0.6rem 2.8rem 0.6rem;
      box-shadow: 0 35px 55px rgba(0, 0, 0, 0.75), inset 0 2px 10px rgba(255, 255, 180, 0.3), 0 0 0 5px rgba(80, 70, 20, 0.5);
      padding: 2rem 1.8rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #f0e5c6;
    }

    .banner {
      width: 100%;
      border-radius: 1.2rem 0.2rem 1.2rem 0.2rem;
      overflow: hidden;
      margin-bottom: 1.6rem;
      border: 2px solid #c6a54c;
      box-shadow: 0 12px 24px rgba(0,0,0,0.7);
      background: #2c321a;
    }
    .banner img {
      width: 100%;
      height: auto;
      max-height: 190px;
      object-fit: cover;
      display: block;
      filter: sepia(0.25) contrast(1.1) brightness(0.95);
    }

    .logo-section {
      margin-top: -2.2rem;
      margin-bottom: 1.2rem;
      z-index: 20;
    }
    .logo-frame {
      width: 115px;
      height: 115px;
      border-radius: 50%;
      background: #2f3821;
      border: 4px solid #b49450;
      box-shadow: 0 0 30px rgba(0,0,0,0.9), inset 0 0 18px #00000050;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .logo-frame img {
      width: 90%;
      height: 90%;
      object-fit: contain;
      border-radius: 50%;
      filter: drop-shadow(0 5px 7px black);
    }

    .station-title {
      font-family: 'Oswald', 'Roboto Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #f7e7b0;
      text-shadow: 4px 4px 0 #2b361c, 6px 6px 0 rgba(0,0,0,0.6);
      background: rgba(18, 20, 8, 0.55);
      padding: 0.5rem 2rem;
      border-radius: 2.5rem 0.4rem 2.5rem 0.4rem;
      margin: 0.5rem 0 0.2rem;
      border-bottom: 3px solid #b49450;
      text-align: center;
      line-height: 1.2;
    }
    .subtitle {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 2.5px;
      color: #cfb87c;
      background: #1c2213cc;
      padding: 0.25rem 1.8rem;
      border-radius: 2rem;
      margin-bottom: 1.4rem;
      display: inline-block;
      border: 1px solid #7a6a34;
    }

    .audio-controls {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      background: #1b2012cc;
      border-radius: 2.5rem 0.6rem 2.5rem 0.6rem;
      padding: 1.3rem 1.5rem;
      border: 1px solid #8b7a44;
      backdrop-filter: blur(8px);
      margin-top: 0.6rem;
    }

    .play-button {
      background: #4c5b2b;
      border: 3px solid #c7a44b;
      color: #faf3d8;
      font-size: 3.8rem;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 12px 18px rgba(0,0,0,0.8), inset 0 -5px 0 #2b3316, 0 0 0 6px rgba(180, 148, 80, 0.45);
      transition: 0.15s;
      background: radial-gradient(circle at 35% 35%, #6b7a3a, #3a481f);
      text-shadow: 3px 3px 0 #1a1e0a;
      user-select: none;
    }
    .play-button:hover {
      background: radial-gradient(circle at 35% 35%, #8b9a45, #4b5c23);
      border-color: #e6c468;
      box-shadow: 0 14px 24px black, 0 0 0 8px rgba(210, 175, 70, 0.55);
      transform: scale(1.04);
    }
    .play-button:active {
      transform: scale(0.95);
    }
    .play-button.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    .volume-slider-container {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }
    .volume-icon {
      font-size: 1.5rem;
      color: #dbb44b;
    }
    input[type="range"] {
      width: 70%;
      max-width: 240px;
      height: 8px;
      -webkit-appearance: none;
      background: linear-gradient(to right, #4f612a, #cbb058);
      border-radius: 12px;
      box-shadow: inset 0 2px 6px black;
      border: 1px solid #5f501f;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: radial-gradient(circle, #f7e696, #b08624);
      border: 2px solid #2b2b0a;
      border-radius: 50%;
      box-shadow: 0 0 10px black;
      cursor: pointer;
    }

    .status-text {
      font-weight: bold;
      background: #0d1107cc;
      padding: 0.35rem 1.6rem;
      border-radius: 2rem;
      font-size: 0.95rem;
      letter-spacing: 1px;
      color: #ebd494;
      border-left: 5px solid #b49450;
      border-right: 5px solid #b49450;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }
    .status-text:hover {
      background: #1f2412dd;
    }

    .icecast-info {
      font-size: 0.7rem;
      opacity: 0.8;
      color: #b9a566;
      letter-spacing: 0.5px;
      text-align: center;
      margin-top: 0.2rem;
    }

    .error-detail {
      font-size: 0.65rem;
      color: #e8c170;
      margin-top: 0.2rem;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="flag-background" aria-hidden="true"></div>

  <div class="player-container">
    <div class="banner">
      <img src="https://i.imgur.com/DIYvLJP.jpeg" alt="Banner Centro de Veteranos de Malvinas, Marcos Paz, Prov. de Buenos Aires" loading="lazy">
    </div>

    <div class="logo-section">
      <div class="logo-frame">
        <img src="https://i.imgur.com/Hf7G0jq.png" alt="Logo Radio La Tropa" loading="lazy">
      </div>
    </div>

    <h1 class="station-title">RADIO LA TROPA</h1>
    <div class="subtitle">Centro de Veteranos de Malvinas, Marcos Paz, Prov. de Buenos Aires</div>

    <div class="audio-controls">
      <audio id="icecastAudio" preload="none"></audio>
      
      <div class="play-button" id="playButton" role="button" aria-label="Reproducir Icecast">▶</div>

      <div class="volume-slider-container">
        <span class="volume-icon">🔊</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" aria-label="Volumen">
      </div>

      <div id="statusMessage" class="status-text">⏹ DETENIDO</div>
      <div class="icecast-info">Icecast2 · chino.republicahosting.com:8219/live</div>
      <div id="errorDetail" class="error-detail"></div>
    </div>
  </div>

  <script>
    (function() {
      // Configuración
      const STREAM_URL = "http://chino.republicahosting.com:8219/live";
      
      // Elementos DOM
      const audio = document.getElementById('icecastAudio');
      const playBtn = document.getElementById('playButton');
      const volumeSlider = document.getElementById('volumeSlider');
      const statusEl = document.getElementById('statusMessage');
      const errorDetail = document.getElementById('errorDetail');
      
      // Estado
      let isPlaying = false;
      let userInitiated = false;
      let retryTimeout = null;

      // Configuración inicial del audio
      audio.volume = volumeSlider.value;
      audio.preload = "none";

      // Función para actualizar UI
      function setUIState(playing) {
        if (playing) {
          playBtn.innerHTML = '⏸';
          playBtn.style.background = "radial-gradient(circle at 35% 35%, #7b5e2c, #4a3a1a)";
          playBtn.classList.remove('loading');
          statusEl.innerHTML = '🔊 AL AIRE · RADIO LA TROPA';
          errorDetail.textContent = '';
        } else {
          playBtn.innerHTML = '▶';
          playBtn.style.background = "radial-gradient(circle at 35% 35%, #6b7a3a, #3a481f)";
          playBtn.classList.remove('loading');
          statusEl.innerHTML = '⏹ DETENIDO';
        }
      }

      // Función para cargar el stream
      function loadStream() {
        if (retryTimeout) {
          clearTimeout(retryTimeout);
          retryTimeout = null;
        }

        audio.src = STREAM_URL;
        audio.load();
      }

      // Manejo de errores mejorado
      function handleError(e) {
        console.log('Error evento audio:', e);
        const audioError = audio.error;
        let errorMsg = '';
        
        if (audioError) {
          switch(audioError.code) {
            case MediaError.MEDIA_ERR_ABORTED:
              errorMsg = 'Reproducción cancelada';
              break;
            case MediaError.MEDIA_ERR_NETWORK:
              errorMsg = 'Error de red - Verificando conexión...';
              break;
            case MediaError.MEDIA_ERR_DECODE:
              errorMsg = 'Error al decodificar el stream';
              break;
            case MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED:
              errorMsg = 'Formato de stream no soportado o URL inaccesible';
              break;
            default:
              errorMsg = 'Error desconocido';
          }
        } else {
          errorMsg = 'Error de conexión con el servidor Icecast';
        }

        console.warn('Error Icecast2:', errorMsg, audioError);
        isPlaying = false;
        setUIState(false);
        statusEl.innerHTML = '⚠ ERROR DE CONEXIÓN';
        errorDetail.textContent = errorMsg + ' - Reintentando...';
        
        if (userInitiated) {
          retryTimeout = setTimeout(() => {
            console.log('Reintentando conexión...');
            statusEl.innerHTML = '🔄 RECONECTANDO...';
            errorDetail.textContent = 'Intentando reconexión al servidor';
            loadStream();
            
            if (userInitiated && !isPlaying) {
              const playPromise = audio.play();
              if (playPromise !== undefined) {
                playPromise.catch(err => {
                  console.log('Reintento fallido:', err);
                });
              }
            }
          }, 3000);
        }
      }

      // Event listeners del audio
      audio.addEventListener('loadstart', () => {
        console.log('Iniciando carga del stream...');
        statusEl.innerHTML = '⏳ CARGANDO STREAM...';
        playBtn.classList.add('loading');
        errorDetail.textContent = '';
      });

      audio.addEventListener('playing', () => {
        console.log('Stream reproduciendo');
        isPlaying = true;
        setUIState(true);
        statusEl.innerHTML = '📡 ICEcast2 · TRANSMISIÓN EN VIVO';
        errorDetail.textContent = '';
        userInitiated = true;
      });

      audio.addEventListener('pause', () => {
        if (!audio.ended && audio.error === null) {
          isPlaying = false;
          setUIState(false);
        }
      });

      audio.addEventListener('waiting', () => {
        statusEl.innerHTML = '⏳ BUFFERING...';
        playBtn.classList.add('loading');
      });

      audio.addEventListener('canplay', () => {
        playBtn.classList.remove('loading');
        if (!isPlaying) {
          statusEl.innerHTML = '✅ LISTO PARA REPRODUCIR';
          errorDetail.textContent = '';
        }
      });

      audio.addEventListener('ended', () => {
        isPlaying = false;
        setUIState(false);
        statusEl.innerHTML = '⏹ STREAM FINALIZADO';
      });

      audio.addEventListener('error', handleError);

      audio.addEventListener('stalled', () => {
        statusEl.innerHTML = '⚠ CONEXIÓN INESTABLE';
        errorDetail.textContent = 'Esperando datos del servidor...';
      });

      // Función principal toggle play/pause
      function toggleIcecast() {
        if (!audio.src || audio.src === window.location.href || audio.src === '') {
          loadStream();
        }

        if (isPlaying) {
          audio.pause();
          isPlaying = false;
          setUIState(false);
          statusEl.innerHTML = '⏸ PAUSADO';
          errorDetail.textContent = '';
          if (retryTimeout) {
            clearTimeout(retryTimeout);
            retryTimeout = null;
          }
        } else {
          userInitiated = true;
          
          if (audio.error) {
            console.log('Recargando por error previo...');
            loadStream();
          }
          
          statusEl.innerHTML = '⏳ INICIANDO...';
          playBtn.classList.add('loading');
          errorDetail.textContent = '';
          
          const playPromise = audio.play();
          
          if (playPromise !== undefined) {
            playPromise.then(() => {
              console.log('Reproducción iniciada exitosamente');
              isPlaying = true;
              setUIState(true);
            }).catch(err => {
              console.error('Error al reproducir:', err);
              isPlaying = false;
              setUIState(false);
              playBtn.classList.remove('loading');
              
              if (err.name === 'NotAllowedError') {
                statusEl.innerHTML = '🔇 PERMISO REQUERIDO';
                errorDetail.textContent = 'Haga clic en el botón de play para iniciar';
              } else if (err.name === 'NotSupportedError') {
                statusEl.innerHTML = '⛔ FORMATO NO SOPORTADO';
                errorDetail.textContent = 'El navegador no puede reproducir este stream';
                attemptProxyFallback();
              } else {
                statusEl.innerHTML = '⛔ ERROR DE REPRODUCCIÓN';
                errorDetail.textContent = err.message || 'Error desconocido';
              }
            });
          }
        }
      }

      // Fallback con proxy si hay problemas de mixed content
      function attemptProxyFallback() {
        console.log('Intentando con proxy...');
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(STREAM_URL)}`;
        
        statusEl.innerHTML = '🔄 INTENTANDO RUTA ALTERNATIVA...';
        errorDetail.textContent = 'Usando proxy para evitar restricciones...';
        
        audio.src = proxyUrl;
        audio.load();
        
        setTimeout(() => {
          if (userInitiated && !isPlaying) {
            audio.play().catch(() => {
              statusEl.innerHTML = '⛔ NO SE PUDO CONECTAR';
              errorDetail.textContent = 'Acceda directamente a: ' + STREAM_URL;
            });
          }
        }, 1000);
      }

      // Control de volumen
      volumeSlider.addEventListener('input', (e) => {
        const vol = parseFloat(e.target.value);
        audio.volume = vol;
        statusEl.innerHTML = `🔉 VOLUMEN ${Math.round(vol*100)}%`;
        setTimeout(() => {
          if (isPlaying) {
            statusEl.innerHTML = '📡 ICEcast2 · AL AIRE';
          } else {
            statusEl.innerHTML = '⏹ DETENIDO';
          }
        }, 1000);
      });

      // Eventos de clic
      playBtn.addEventListener('click', (e) => {
        e.preventDefault();
        toggleIcecast();
      });
      
      statusEl.addEventListener('click', (e) => {
        e.preventDefault();
        toggleIcecast();
      });

      // Cargar stream inicial
      loadStream();
      
      // Estado inicial
      setUIState(false);
      statusEl.innerHTML = '📻 RADIO LA TROPA - Icecast2';
      errorDetail.textContent = '';
      
      console.log('Reproductor Icecast2 inicializado');
      console.log('Stream URL:', STREAM_URL);
    })();
  </script>
</body>
</html>
